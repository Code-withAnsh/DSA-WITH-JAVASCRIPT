<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        //multiple case have common execution
        let n = Number(prompt("enter a number"));
        switch (n) {
            case 1:
            case 2:
            case 3:
                console.log("monday")
                break;
            case 4:
            case 5:
            case 6:
                console.log("tuesday")
                break;
            default: console.log("error")
        }
    </script>
</body>

</html>

    <script>
        let leap = Number(prompt("enter year to check it is leap or not"))
        let isLeap = false;
        if(leap%4==0){
            if(leap%100 == 0){
                if(leap %400 ==0)
                isLeap = true
            }else{
                isLeap = true
            }
        }
        else 
        isLeap = false
        console.log(isLeap? "leap year": "not a leap year")
    </script>

<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">

<body>
    <script>
     let unit = Number(prompt("enter a unit"));
     let amount = 0;
     if(unit>0 && unit<=100){
        amount = unit*4.2
     }else if(unit>100 && unit<=200){
         amount = (100 *4.2)+(unit-100)*6
     }
     else if(unit>200 && unit<=400){
         amount = (100 *4.2)+ (100*6)+(unit-200)*8
     }else if(unit>400){
        amount = (100*4.2)+(100*6)+(200)*8 + (unit-400)*13 
     }
     console.log(amount)
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n = Number(prompt("enter a numberx"))
        let isPrime = true;
        for(i = 2; i<=n/2;i++){
            if(n%i == 0) {
                isPrime = false;
                break;
            }

        }
        if(isPrime)console.log("prime number")
        else console.log("not a prime number")
    </script>
</body>
</html>
